<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Dice Roller</title>
    <style>
        :root {
            --red: #ef4444;
            --yellow: #f59e0b;
            --green: #10b981;
            --blue: #3b82f6;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --die-bg: #ffffff;
            --pip-color: #1e293b;
            --frozen-color: #3b82f6;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden;
            user-select: none;
        }

        .screen {
            display: none;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        .screen.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Setup Screen */
        #setup-screen {
            background-color: var(--bg);
            overflow-y: auto;
            justify-content: flex-start;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: var(--card);
            padding: 32px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin: auto;
        }

        h1 { margin: 0 0 24px 0; font-size: 24px; text-align: center; }
        .section-label { font-size: 14px; font-weight: 600; color: var(--text-muted); margin-bottom: 12px; text-transform: uppercase; }

        .control-row { display: flex; gap: 12px; margin-bottom: 24px; }
        .control-item { flex: 1; }

        select, input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 16px;
        }

        .player-entry {
            display: grid;
            grid-template-columns: 1fr 120px;
            gap: 10px;
            margin-bottom: 12px;
            background: rgba(15, 23, 42, 0.5);
            padding: 12px;
            border-radius: 16px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 16px;
            cursor: pointer;
        }

        .btn-start {
            margin-top: 32px;
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            background: var(--blue);
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Game Screen */
        #game-screen {
            cursor: pointer;
            background-color: var(--bg);
        }

        .dice-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            width: 100%;
            max-height: 50vh; /* Keep dice within a reasonable height */
            padding: 10px;
            pointer-events: auto;
        }

        .die {
            /* Responsive sizing based on dice count */
            width: min(240px, 60vw);
            aspect-ratio: 1 / 1;
            background-color: var(--die-bg);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 12%;
            gap: 8%;
            border-radius: 18%; 
            box-shadow: 
                0 10px 0 #cbd5e1, 
                0 20px 40px -10px rgba(0, 0, 0, 0.7);
            transition: transform 0.1s ease-out, box-shadow 0.2s ease, border 0.2s ease;
            position: relative;
            border: 4px solid transparent;
        }

        /* Two dice specific sizing to prevent footer cutoff */
        .two-dice .die {
            width: min(180px, 42vw);
        }

        .die.frozen {
            border: 6px solid var(--frozen-color);
            box-shadow: 
                0 10px 0 #cbd5e1,
                0 0 25px var(--frozen-color);
        }

        .die.frozen::after {
            content: "FROZEN";
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            font-weight: bold;
            color: var(--frozen-color);
            letter-spacing: 2px;
        }

        .die.rolling:not(.frozen) {
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0% { transform: translate(4px, 2px) rotate(0deg); }
            25% { transform: translate(-2px, -4px) rotate(-1deg); }
            50% { transform: translate(-4px, 2px) rotate(1deg); }
            75% { transform: translate(2px, 4px) rotate(-1deg); }
            100% { transform: translate(0px, 0px) rotate(0deg); }
        }

        .pip {
            background-color: var(--pip-color);
            border-radius: 50%;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.15s;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        .pip.visible { opacity: 1; }

        /* UI Overlays */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px 20px 40px 20px; /* Adjusted top padding */
        }

        .header-card {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            padding: 12px 32px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.1s;
            max-width: 90%;
        }

        .header-card:active {
            transform: scale(0.95);
        }

        .current-player-name {
            font-size: 20px;
            font-weight: 800;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .footer-card {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 14px;
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .exit-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            z-index: 100;
            cursor: pointer;
            pointer-events: auto;
            font-weight: bold;
            font-size: 12px;
        }

        .roll-hint {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 10px;
            opacity: 0.6;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- SETUP SCREEN -->
    <div id="setup-screen" class="screen active">
        <div class="container">
            <h1>Dice Roller Setup</h1>
            <div id="setup-error" style="display:none; color: var(--red); text-align: center; margin-bottom: 10px; font-weight: bold;">Please pick unique colors!</div>
            
            <div class="section-label">Dice Mode</div>
            <div class="control-row">
                <select id="dice-count">
                    <option value="1">1 Die</option>
                    <option value="2">2 Dice</option>
                </select>
            </div>

            <div class="section-label">Players (Up to 4)</div>
            <div class="control-row">
                <input type="number" id="player-count" value="2" min="1" max="4">
            </div>

            <div id="player-inputs"></div>

            <div class="checkbox-group" onclick="document.getElementById('quick-play').click()">
                <input type="checkbox" id="quick-play" checked onclick="event.stopPropagation()">
                <span>Quick Play (Auto-advance turns)</span>
            </div>

            <button class="btn-start" onclick="startGame()">START GAME</button>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen" onclick="handleRoll()">
        <button class="exit-btn" onclick="exitGame(event)">EXIT</button>

        <!-- UI Overlay -->
        <div class="ui-layer">
            <div id="header" class="header-card" onclick="advanceAndRoll(event)">
                <div id="header-label" style="font-size: 9px; opacity: 0.7; margin-bottom: 2px; letter-spacing: 0.1em; font-weight: bold;">CURRENT ROLLER</div>
                <h2 id="current-player-ui" class="current-player-name">Player 1</h2>
            </div>

            <!-- Square dice container -->
            <div class="dice-container" id="dice-container">
                <div class="die" id="die-1" onclick="handleDieClick(event, 1)">
                    <div class="pip" id="d1-p1"></div><div class="pip" id="d1-p2"></div><div class="pip" id="d1-p3"></div>
                    <div class="pip" id="d1-p4"></div><div class="pip" id="d1-p5"></div><div class="pip" id="d1-p6"></div>
                    <div class="pip" id="d1-p7"></div><div class="pip" id="d1-p8"></div><div class="pip" id="d1-p9"></div>
                </div>
                <div class="die" id="die-2" onclick="handleDieClick(event, 2)">
                    <div class="pip" id="d2-p1"></div><div class="pip" id="d2-p2"></div><div class="pip" id="d2-p3"></div>
                    <div class="pip" id="d2-p4"></div><div class="pip" id="d2-p5"></div><div class="pip" id="d2-p6"></div>
                    <div class="pip" id="d2-p7"></div><div class="pip" id="d2-p8"></div><div class="pip" id="d2-p9"></div>
                </div>
            </div>

            <div id="hint-text" class="roll-hint">Tap anywhere to roll</div>

            <div class="footer-card">
                Next up: <span id="next-player-ui" style="font-weight: 800; color: #fff;">Player 2</span>
            </div>
        </div>
    </div>

    <script>
        const colorOptions = [
            { name: 'Red', hex: '#ef4444', text: 'white' },
            { name: 'Yellow', hex: '#f59e0b', text: 'black' },
            { name: 'Green', hex: '#10b981', text: 'white' },
            { name: 'Blue', hex: '#3b82f6', text: 'white' }
        ];

        const pipMap = {
            1: [5],
            2: [3, 7],
            3: [3, 5, 7],
            4: [1, 3, 7, 9],
            5: [1, 3, 5, 7, 9],
            6: [1, 3, 4, 6, 7, 9]
        };

        let players = [];
        let currentPlayerIdx = 0;
        let isRolling = false;
        let numDice = 1;
        let frozenDieIdx = null; 
        let lastTapTime = 0;

        const playerCountInput = document.getElementById('player-count');
        const playerInputs = document.getElementById('player-inputs');

        playerCountInput.addEventListener('input', updatePlayerFields);
        
        function updatePlayerFields() {
            let count = Math.min(Math.max(parseInt(playerCountInput.value) || 1, 1), 4);
            playerInputs.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const row = document.createElement('div');
                row.className = 'player-entry';
                row.innerHTML = `
                    <input type="text" class="p-name" placeholder="Name" value="Player ${i+1}" maxlength="15">
                    <select class="p-color">
                        ${colorOptions.map((c, idx) => `<option value="${idx}" ${idx === i ? 'selected' : ''}>${c.name}</option>`).join('')}
                    </select>
                `;
                playerInputs.appendChild(row);
            }
        }

        function setPips(dieNum, value) {
            const pips = pipMap[value];
            for (let i = 1; i <= 9; i++) {
                const el = document.getElementById(`d${dieNum}-p${i}`);
                if (el) el.classList.remove('visible');
            }
            pips.forEach(p => {
                const el = document.getElementById(`d${dieNum}-p${p}`);
                if (el) el.classList.add('visible');
            });
        }

        function handleDieClick(e, idx) {
            e.stopPropagation();
            if (isRolling) return;
            
            const isQuickPlay = document.getElementById('quick-play').checked;
            if (isQuickPlay || numDice === 1) return;

            const now = Date.now();
            if (now - lastTapTime < 300) {
                toggleFreeze(idx);
                lastTapTime = 0; 
            } else {
                lastTapTime = now;
            }
        }

        function toggleFreeze(idx) {
            if (frozenDieIdx === idx) {
                frozenDieIdx = null;
            } else {
                frozenDieIdx = idx;
            }
            updateDiceStyles();
        }

        function updateDiceStyles() {
            document.getElementById('die-1').classList.toggle('frozen', frozenDieIdx === 1);
            document.getElementById('die-2').classList.toggle('frozen', frozenDieIdx === 2);
        }

        function startGame() {
            const nameInputs = document.querySelectorAll('.p-name');
            const colorSelects = document.querySelectorAll('.p-color');
            const selectedColorIdxs = Array.from(colorSelects).map(s => s.value);

            if (new Set(selectedColorIdxs).size !== selectedColorIdxs.length) {
                document.getElementById('setup-error').style.display = 'block';
                return;
            }

            players = Array.from(nameInputs).map((n, i) => ({
                name: (n.value || `Player ${i+1}`).substring(0, 15),
                color: colorOptions[colorSelects[i].value]
            }));

            numDice = parseInt(document.getElementById('dice-count').value);
            const container = document.getElementById('dice-container');
            const die2 = document.getElementById('die-2');
            
            die2.style.display = numDice === 2 ? 'grid' : 'none';
            container.className = numDice === 2 ? 'dice-container two-dice' : 'dice-container';
            
            frozenDieIdx = null;
            updateDiceStyles();

            currentPlayerIdx = 0;
            updateGameUI();
            setPips(1, 1);
            if(numDice === 2) setPips(2, 1);

            document.getElementById('setup-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            document.getElementById('setup-error').style.display = 'none';

            const isQuickPlay = document.getElementById('quick-play').checked;
            let hint = "Tap background to roll";
            if (!isQuickPlay) {
                hint += "<br><span style='font-size:9px; opacity:0.6'>Tap name to advance.</span>";
                if (numDice === 2) {
                    hint += "<br><span style='font-size:9px; opacity:0.6'>Double tap a die to freeze.</span>";
                }
            }
            document.getElementById('hint-text').innerHTML = hint;
        }

        function handleRoll(e) {
            if (isRolling) return;
            triggerRoll();
        }

        function advanceAndRoll(e) {
            if (e) e.stopPropagation();
            if (isRolling) return;

            const isQuickPlay = document.getElementById('quick-play').checked;
            if (!isQuickPlay) {
                currentPlayerIdx = (currentPlayerIdx + 1) % players.length;
                updateGameUI();
                triggerRoll();
            }
        }

        function triggerRoll() {
            isRolling = true;

            const die1 = document.getElementById('die-1');
            const die2 = document.getElementById('die-2');
            
            if (frozenDieIdx !== 1) die1.classList.add('rolling');
            if (numDice === 2 && frozenDieIdx !== 2) die2.classList.add('rolling');

            const rollDuration = 650;
            const interval = 80;
            
            const flipTimer = setInterval(() => {
                if (frozenDieIdx !== 1) setPips(1, Math.floor(Math.random() * 6) + 1);
                if (numDice === 2 && frozenDieIdx !== 2) setPips(2, Math.floor(Math.random() * 6) + 1);
            }, interval);

            setTimeout(() => {
                clearInterval(flipTimer);
                die1.classList.remove('rolling');
                die2.classList.remove('rolling');
                
                if (frozenDieIdx !== 1) setPips(1, Math.floor(Math.random() * 6) + 1);
                if (numDice === 2 && frozenDieIdx !== 2) setPips(2, Math.floor(Math.random() * 6) + 1);

                const isQuickPlay = document.getElementById('quick-play').checked;
                if (isQuickPlay) {
                    setTimeout(() => {
                        currentPlayerIdx = (currentPlayerIdx + 1) % players.length;
                        updateGameUI();
                        isRolling = false;
                    }, 400);
                } else {
                    isRolling = false;
                }
            }, rollDuration);
        }

        function updateGameUI() {
            const player = players[currentPlayerIdx];
            const next = players[(currentPlayerIdx + 1) % players.length];

            const header = document.getElementById('header');
            const nameUI = document.getElementById('current-player-ui');
            const nextUI = document.getElementById('next-player-ui');
            const labelUI = document.getElementById('header-label');

            header.style.borderTop = `6px solid ${player.color.hex}`;
            nameUI.textContent = player.name;
            nameUI.style.color = player.color.hex;
            
            nextUI.textContent = next.name;
            nextUI.style.color = next.color.hex;

            const isQuickPlay = document.getElementById('quick-play').checked;
            labelUI.textContent = isQuickPlay ? "CURRENT ROLLER" : "TAP TO ADVANCE TURN";
        }

        function exitGame(e) {
            e.stopPropagation();
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('setup-screen').classList.add('active');
        }

        updatePlayerFields();
    </script>
</body>
</html>
